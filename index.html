<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan App</title>

<style>

body{
margin:0;
padding:15px;
font-family:Arial,sans-serif;
background:#081229;
color:white;
}

.logo{
width:170px;
height:170px;
object-fit:cover;
display:block;
margin:auto;
border-radius:20px;
border:4px solid gold;
}

.appName{
font-size:36px;
font-weight:bold;
text-align:center;
margin-top:10px;
background:linear-gradient(45deg,#ffcc00,#ff0066,#00ffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.card{
background:#1e293b;
padding:18px;
border-radius:15px;
margin-top:20px;
}

input,textarea,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

button{
background:gold;
color:black;
font-weight:bold;
cursor:pointer;
}

.customer{
background:#334155;
padding:15px;
border-radius:12px;
margin-top:12px;
}

.smallBtn{
width:auto;
padding:7px 10px;
font-size:13px;
margin-right:5px;
margin-top:5px;
}

.flex{
display:flex;
gap:10px;
}

.actionBtns{
display:flex;
gap:10px;
margin-top:10px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="card" id="loginPage">

<img
src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Lord_Murugan.jpg/320px-Lord_Murugan.jpg"
class="logo">

<div class="appName">
Loan App
</div>

<h2 style="text-align:center;">
Login
</h2>

<input type="text"
id="username"
placeholder="User ID">

<input type="password"
id="password"
placeholder="Password">

<button onclick="loginUser()">
LOGIN
</button>

</div>

<!-- MAIN APP -->

<div id="mainApp"
style="display:none;">

<img
src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Lord_Murugan.jpg/320px-Lord_Murugan.jpg"
class="logo">

<div class="appName"
id="topName">
శ్రీ షణ్ముఖ
</div>

<!-- DASHBOARD -->

<div class="card">

<h2>📊 Dashboard</h2>

<button onclick="showPage('paymentPage')">
➕ Add Payment
</button>

<button onclick="showPage('collectionPage')">
💰 Add Collection
</button>

<button onclick="showPage('detailsPage')">
📄 Customer Details
</button>

<button onclick="showPage('searchPage')">
🔍 Search Customer
</button>

<button onclick="showPage('calendarPage')">
📅 Collection Calendar
</button>

<button onclick="showPage('addressPage')">
📞 Address & Phone
</button>

</div>

<!-- PAYMENT -->

<div class="card"
id="paymentPage"
style="display:none;">

<h2>Add Payment</h2>

<input type="number"
id="series"
placeholder="Serial Number">

<input type="text"
id="name"
placeholder="Customer Name">

<input type="number"
id="phone"
placeholder="Phone Number">

<textarea
id="address"
placeholder="Customer Address"></textarea>

<input type="number"
id="amount"
placeholder="Amount">

<input type="number"
id="weeks"
placeholder="Weeks"
onkeyup="calculateDetails()">

<input type="date"
id="givenDate"
onchange="calculateDetails()">

<input type="date"
id="closingDate">

<input type="number"
id="weeklyPayment"
placeholder="Weekly Payment">

<button onclick="saveCustomer()">
SAVE CUSTOMER
</button>

</div>

<!-- COLLECTION -->

<div class="card"
id="collectionPage"
style="display:none;">

<h2>Add Collection</h2>

<input type="date"
id="selectedCollectionDate">

<div class="flex">

<input type="number"
id="collectionSeries"
placeholder="Serial Number">

<input type="number"
id="collectionAmount"
placeholder="Amount">

</div>

<button onclick="addCollection()">
ADD COLLECTION
</button>

<div id="collectionList"></div>

<h3>
Total :
₹<span id="totalCollection">0</span>
</h3>

</div>

<!-- DETAILS -->

<div class="card"
id="detailsPage"
style="display:none;">

<h2>Customer Details</h2>

<div id="customerDetails"></div>

</div>

<!-- SEARCH -->

<div class="card"
id="searchPage"
style="display:none;">

<h2>Search Customer</h2>

<input type="text"
id="search"
placeholder="Search"
onkeyup="searchCustomer()">

<div id="searchResults"></div>

</div>

<!-- CALENDAR -->

<div class="card"
id="calendarPage"
style="display:none;">

<h2>Daily Collection</h2>

<input type="date"
id="calendarDate"
onchange="showCalendarCollection()">

<div id="calendarResults"></div>

<h3>
Total :
₹<span id="calendarTotal">0</span>
</h3>

</div>

<!-- ADDRESS -->

<div class="card"
id="addressPage"
style="display:none;">

<h2>Address & Phone</h2>

<div id="addressList"></div>

</div>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// FIREBASE

const firebaseConfig = {

apiKey:
"AIzaSyCd7xhIqcBK7JKIncLRzr4phBTklmiXXmA",

authDomain:
"shanmuka-lone-app.firebaseapp.com",

projectId:
"shanmuka-lone-app",

storageBucket:
"shanmuka-lone-app.firebasestorage.app",

messagingSenderId:
"550746602562",

appId:
"1:550746602562:web:a9cb01a15351a2522ac1db"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

// GLOBAL

window.currentUser='';

window.customers=[];

window.collections=[];

// LOGIN

window.loginUser =
async function(){

const user =
document.getElementById('username').value;

const pass =
document.getElementById('password').value;

if(
user==='shanmuka'
&&
pass==='shanmuka99'
){

currentUser='shanmuka';

document.getElementById('topName')
.innerText='శ్రీ షణ్ముఖ';

}

else if(
user==='Sivagowri'
&&
pass==='Sivagowri99'
){

currentUser='sivagowri';

document.getElementById('topName')
.innerText='Siva Gowri';

}

else{

alert('Wrong Login');

return;

}

await loadCustomers();

await loadCollections();

document.getElementById('loginPage')
.style.display='none';

document.getElementById('mainApp')
.style.display='block';

}

// PAGE

window.showPage =
function(id){

const pages=[

'paymentPage',
'collectionPage',
'detailsPage',
'searchPage',
'calendarPage',
'addressPage'

];

pages.forEach(page=>{

document.getElementById(page)
.style.display='none';

});

document.getElementById(id)
.style.display='block';

}

// CALCULATE

window.calculateDetails =
function(){

const amount=
Number(
document.getElementById('amount').value
);

const weeks=
Number(
document.getElementById('weeks').value
);

const givenDate=
document.getElementById('givenDate').value;

if(amount && weeks){

document.getElementById('weeklyPayment').value=
Math.ceil(amount/weeks);

}

if(givenDate && weeks){

const d=new Date(givenDate);

d.setDate(
d.getDate() + (weeks*7)
);

document.getElementById('closingDate').value=
d.toISOString().split('T')[0];

}

}

// SAVE CUSTOMER

window.saveCustomer =
async function(){

const customer={

id:Date.now(),

series:
document.getElementById('series').value,

name:
document.getElementById('name').value,

phone:
document.getElementById('phone').value,

address:
document.getElementById('address').value,

amount:Number(
document.getElementById('amount').value
),

weeks:Number(
document.getElementById('weeks').value
),

givenDate:
document.getElementById('givenDate').value,

closingDate:
document.getElementById('closingDate').value,

weeklyPayment:Number(
document.getElementById('weeklyPayment').value
),

paid:0,

balance:Number(
document.getElementById('amount').value
),

history:[]

};

await addDoc(

collection(
db,
currentUser + "_customers"
),

customer

);

alert("Customer Saved");

await loadCustomers();

}

// LOAD CUSTOMERS

window.loadCustomers =
async function(){

customers=[];

const querySnapshot =
await getDocs(

collection(
db,
currentUser + "_customers"
)

);

querySnapshot.forEach((d)=>{

customers.push({

firebaseId:d.id,

...d.data()

});

});

renderDetails();

renderAddress();

}

// ADD COLLECTION

window.addCollection =
async function(){

const series=
document.getElementById(
'collectionSeries'
).value;

const amount=
Number(
document.getElementById(
'collectionAmount'
).value
);

const selectedDate=
document.getElementById(
'selectedCollectionDate'
).value;

const customer=
customers.find(
c=>c.series==series
);

if(!customer){

alert(
'Customer Not Found'
);

return;

}

customer.paid += amount;

customer.balance =
customer.amount -
customer.paid;

customer.history.push({

date:selectedDate,

amount:amount

});

await updateDoc(

doc(
db,
currentUser + "_customers",
customer.firebaseId
),

{

paid:customer.paid,

balance:customer.balance,

history:customer.history

}

);

await addDoc(

collection(
db,
currentUser + "_collections"
),

{

series:customer.series,

name:customer.name,

amount:amount,

date:selectedDate

}

);

alert(
"Collection Added"
);

await loadCustomers();

await loadCollections();

}

// LOAD COLLECTIONS

window.loadCollections =
async function(){

collections=[];

const querySnapshot =
await getDocs(

collection(
db,
currentUser + "_collections"
)

);

querySnapshot.forEach((d)=>{

collections.push({

firebaseId:d.id,

...d.data()

});

});

renderCollection();

}

// RENDER COLLECTION

function renderCollection(){

const list=
document.getElementById(
'collectionList'
);

list.innerHTML='';

let total=0;

const selectedDate=
document.getElementById(
'selectedCollectionDate'
).value;

collections.forEach(c=>{

if(c.date==selectedDate){

total += Number(c.amount);

list.innerHTML += `

<div class="customer">

#${c.series}
-
${c.name}

<br><br>

₹${c.amount}

<br><br>

${c.date}

</div>

`;

}

});

document.getElementById(
'totalCollection'
).innerText=total;

}

// DETAILS

function renderDetails(){

const list=
document.getElementById(
'customerDetails'
);

list.innerHTML='';

customers.forEach(c=>{

list.innerHTML += `

<div class="customer">

<h3>

#${c.series}
-
${c.name}

</h3>

<p>
📞 ${c.phone}
</p>

<p>
💰 Amount :
₹${c.amount}
</p>

<p>
✅ Paid :
₹${c.paid}
</p>

<p>
⚠️ Balance :
₹${c.balance}
</p>

<p>
📅 Close :
${c.closingDate}
</p>

<button class="smallBtn"
onclick="viewCustomer(${c.id})">

👁 View

</button>

<button class="smallBtn"
onclick="editCustomer(${c.id})">

✏ Edit

</button>

<button class="smallBtn"
onclick="deleteCustomer(${c.id})">

🗑 Delete

</button>

</div>

`;

});

}

// VIEW

window.viewCustomer =
function(id){

const c=
customers.find(
x=>x.id==id
);

let history='';

c.history.forEach(h=>{

history +=
`${h.date} : ₹${h.amount}\n`;

});

alert(

`Name : ${c.name}

Amount : ₹${c.amount}

Paid : ₹${c.paid}

Balance : ₹${c.balance}

History :

${history}`

);

}

// EDIT

window.editCustomer =
async function(id){

const customer=
customers.find(
c=>c.id==id
);

const newName=
prompt(
'Edit Name',
customer.name
);

if(newName==null) return;

await updateDoc(

doc(
db,
currentUser + "_customers",
customer.firebaseId
),

{

name:newName

}

);

alert(
"Updated"
);

await loadCustomers();

}

// DELETE

window.deleteCustomer =
async function(id){

const ok=
confirm(
'Delete Customer ?'
);

if(!ok) return;

const customer=
customers.find(
c=>c.id==id
);

await deleteDoc(

doc(
db,
currentUser + "_customers",
customer.firebaseId
)

);

alert(
"Deleted"
);

await loadCustomers();

}

// SEARCH

window.searchCustomer =
function(){

const value=
document.getElementById('search')
.value.toLowerCase();

const results=
document.getElementById(
'searchResults'
);

results.innerHTML='';

customers.forEach(c=>{

if(

c.name.toLowerCase()
.includes(value)

||

String(c.series)
.includes(value)

){

results.innerHTML += `

<div class="customer">

<h3>

#${c.series}
-
${c.name}

</h3>

<p>

Balance :
₹${c.balance}

</p>

</div>

`;

}

});

}

// CALENDAR

window.showCalendarCollection =
function(){

const date=
document.getElementById(
'calendarDate'
).value;

const result=
document.getElementById(
'calendarResults'
);

result.innerHTML='';

let total=0;

collections.forEach(c=>{

if(c.date==date){

total += Number(c.amount);

result.innerHTML += `

<div class="customer">

#${c.series}
-
${c.name}

<br><br>

₹${c.amount}

</div>

`;

}

});

document.getElementById(
'calendarTotal'
).innerText=total;

}

// ADDRESS

function renderAddress(){

const list=
document.getElementById(
'addressList'
);

list.innerHTML='';

customers.forEach(c=>{

list.innerHTML += `

<div class="customer">

#${c.series}
-
${c.name}

<br><br>

📞 ${c.phone}

<br><br>

🏠 ${c.address}

<div class="actionBtns">

<a href="tel:${c.phone}"
style="flex:1;">

<button>

📞 Call

</button>

</a>

<button
onclick="copyNumber('${c.phone}')">

📋 Copy

</button>

</div>

</div>

`;

});

}

// COPY

window.copyNumber =
function(number){

navigator.clipboard.writeText(number);

alert('Copied');

}

</script>

</body>
</html>
